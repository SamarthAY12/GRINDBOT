<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Workout History | GRINDBOT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:30px;
    font-family:Poppins,sans-serif;
    background:#f3f6fb;
}

.container{
    max-width:1100px;
    margin:auto;
}

.card{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#22c55e;
    color:white;
    padding:15px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#f5f5f5;
}

a{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:#22c55e;
    font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<a href="/">⬅ Back to Dashboard</a>

<div class="card">

<h1>📈 Workout History</h1>

<table>

<tr>

<th>Date</th>

<th>Weight</th>

<th>Energy</th>

<th>Sleep</th>

<th>Notes</th>

</tr>

{% for item in history %}

<tr>

<td>{{ item.created_at.strftime('%d-%m-%Y') }}</td>

<td>{{ item.current_weight }} kg</td>

<td>{{ item.energy }}/5</td>

<td>{{ item.sleep }}/5</td>

<td>{{ item.notes }}</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>

</html>
